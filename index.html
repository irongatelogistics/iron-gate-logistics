<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Gate Logistics — Secure Truck &amp; Trailer Parking | Cottage Grove, OR</title>
  <meta name="description" content="Secure parking for trucks, trailers, and fleets along the I-5 corridor. Fenced, lit, monitored 24/7. Cottage Grove, Oregon.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Iron Gate Logistics — Grand Opening announcement banner -->
  <div id="announcement-banner" style="background:#1a2332; color:#ffffff; font-family:Arial, Helvetica, sans-serif; padding:12px 20px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:10px 18px; text-align:center; font-size:15px; line-height:1.4; position:relative;">
    <span style="font-weight:600;">
      🚛 <span style="color:#f5a623; font-weight:700;">NOW OPEN</span> — Grand Opening: Fleets park 5, get the <span style="color:#f5a623; font-weight:700;">6th stall FREE</span>. Refer a driver &amp; you both get a free week.
    </span>
    <a href="tel:19712450654" style="background:#f5a623; color:#1a2332; font-weight:700; text-decoration:none; padding:8px 16px; border-radius:4px; white-space:nowrap;">
      Call (971) 245-0654
    </a>
    <button onclick="dismissBanner()" aria-label="Dismiss" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#ffffff; font-size:20px; line-height:1; cursor:pointer; padding:0 4px;">&times;</button>
  </div>

  <script>
    // Track banner height as a CSS variable so the fixed nav can sit below it.
    function updateBannerH() {
      var b = document.getElementById('announcement-banner');
      var h = (b && b.style.display !== 'none') ? b.offsetHeight : 0;
      document.documentElement.style.setProperty('--banner-h', h + 'px');
    }
    function dismissBanner() {
      var b = document.getElementById('announcement-banner');
      if (b) b.style.display = 'none';
      document.documentElement.style.setProperty('--banner-h', '0px');
    }
    updateBannerH();
    window.addEventListener('resize', updateBannerH);
  </script>

  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel standalone (in-browser JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <!-- Site components + app entry -->
  <script type="text/babel" src="script.js"></script>
